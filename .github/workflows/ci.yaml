name: Minimal CLI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Set up .netrc for private packages
        run: |
          echo "machine github.com login __token__ password ${{ secrets.INSTAFS_GITHUB_TOKEN }}" >> ~/.netrc

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv sync

      - name: Run ty check
        run: uv run ty check

      - name: Run ruff check
        run: uv run ruff check .

      - name: Run tests
        run: uv run pytest tests
