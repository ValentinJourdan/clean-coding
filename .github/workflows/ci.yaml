name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          python-version: "3.11"

      - name: Set up .netrc for private packages
        run: echo "machine github.com login __token__ password ${{ secrets.INSTAFS_GITHUB_TOKEN }}" >> ~/.netrc

      - name: Install dependencies
        run: uv sync

      - name: Run ruff
        run: uv run ruff check .

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          python-version: "3.11"

      - name: Set up .netrc for private packages
        run: echo "machine github.com login __token__ password ${{ secrets.INSTAFS_GITHUB_TOKEN }}" >> ~/.netrc

      - name: Install dependencies
        run: uv sync

      - name: Run ty
        run: uv run ty check

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          python-version: "3.11"

      - name: Set up .netrc for private packages
        run: echo "machine github.com login __token__ password ${{ secrets.INSTAFS_GITHUB_TOKEN }}" >> ~/.netrc

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest --cov=. tests
